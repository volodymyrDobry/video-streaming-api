databaseChangeLog:
  - changeSet:
      id: 3
      author: volodymyr.dobrianskyi
      changes:
        - createTable:
            tableName: movies
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: plot
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: poster_link
                  type: varchar
                  constraints:
                    nullable: false
        - createTable:
            tableName: actors
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false

        - createTable:
            tableName: movie_actors
            columns:
              - column:
                  name: movie_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_movie_actors_movie
                    references: movies(id)
              - column:
                  name: actor_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_movie_actors_actor
                    references: actors(id)

