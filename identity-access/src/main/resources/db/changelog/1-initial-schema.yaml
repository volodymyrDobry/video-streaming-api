databaseChangeLog:
  - changeSet:
      id: 1
      author: "volodymyr.dobrianskyi"
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: varchar(64)
                  constraints:
                    primaryKey: true
              - column:
                  name: email
                  type: varchar(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false

        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false
                    unique: true

        - createTable:
            tableName: account_roles
            columns:
              - column:
                  name: account_id
                  type: varchar(64)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_account_roles_account
                    references: accounts(id)
              - column:
                  name: role_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_account_roles_roles
                    references: roles(id)
