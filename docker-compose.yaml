services:
  content-service-db:
    image: 'mongo:latest'
    container_name: mongodb
    ports:
      - '27017:27017'
    environment:
      - 'MONGO_INITDB_DATABASE=content'
      - 'MONGO_INITDB_ROOT_PASSWORD=secret'
      - 'MONGO_INITDB_ROOT_USERNAME=root'
    volumes:
      - content_data:/data/db
    healthcheck:
      test:
        "echo 'db.runCommand({ ping: 1 }).ok' | mongosh admin -u root -p secret --quiet | grep 1"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
  postgres_db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak_db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "keycloak" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak_db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
#      KEYCLOAK_FEATURES: scripts
#      KC_HEALTH_ENABLED: true
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./keycloak-event-listener/build/libs:/opt/keycloak/providers
    depends_on:
      keycloak_db:
        condition: service_healthy
#    healthcheck:
#      test: >
#        CMD-SHELL exec 3<>/dev/tcp/127.0.0.1/9000 &&
#        echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 &&
#        grep -q '"status":"UP"' <&3
#      interval: 30s
#      timeout: 10s
#      retries: 3
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
      - JAVA_OPTS=-Xms512m -Xmx1024m

volumes:
  postgres_data:
  keycloak_data:
  content_data:
