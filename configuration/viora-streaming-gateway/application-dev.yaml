spring:
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: streaming-and-video
              uri: http://localhost:8083
            - id: content-service
              uri: http://localhost:8080
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 500
                    redis-rate-limiter.burstCapacity: 1000
            - id: identity-access
              uri: http://localhost:8082
            - id: user-streaming-history
              uri: http://localhost:8085

logging:
  level:
    root: INFO
    com.viora: DEBUG
    org.springframework.cloud.gateway: DEBUG

server:
  port: 8084

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops
  endpoint:
    health:
      show-details: always

