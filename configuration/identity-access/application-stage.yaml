spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:postgresql://postgres-stage:5432/viora_identity_stage
    hikari:
      maximum-pool-size: 20
  liquibase:
    enabled: true

logging:
  level:
    root: WARN
    com.viora: INFO
    org.springframework.security: WARN

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

