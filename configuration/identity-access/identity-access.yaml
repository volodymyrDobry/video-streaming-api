spring:
  application:
    name: identity-access
    keycloak:
      url: ${KEYCLOAK_URI:http://localhost:8081}
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      client:
        registration:
          user-management-client:
            provider: keycloak
            client-id: ${KEYCLOAK_USER_MANAGEMENT_CLIENT_ID:user-management-client}
            client-secret: ${KEYCLOAK_USER_MANAGEMENT_CLIENT_SECRET:9xX4ObYEIDXHHryau8tOrUnzQxS8p4js}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URI:http://localhost:8081}/realms/viora-dev

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

