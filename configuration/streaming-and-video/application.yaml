spring:
  application:
    name: streaming-and-video
    movie-details:
      baseUrl: ${CONTENT_SERVICE:http://localhost:8080}
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5431/streaming_and_video}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: ${JPA_SHOW_SQL:false}
  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/viora-dev
      client:
        registration:
          video-management-client:
            provider: keycloak
            client-id: ${KEYCLOAK_USER_MANAGEMENT_CLIENT_ID:video-management-client}
            client-secret: ${KEYCLOAK_USER_MANAGEMENT_CLIENT_SECRET:7o75o4qM0iy0JWBjU7N9lyEF1UIK5MU4}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URI:http://localhost:8081}/realms/viora-dev

resilience4j:
  circuitbreaker:
    instances:
      movie-details:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      movie-details:
        maxAttempts: 3
        waitDuration: 1s
  timelimiter:
    instances:
      movie-details:
        timeoutDuration: 3s

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8083}

