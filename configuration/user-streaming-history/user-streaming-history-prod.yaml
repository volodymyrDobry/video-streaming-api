spring:
  data:
    mongodb:
      host: mongo-prod
      port: 27018
      database: streaming-history-prod
      auth-source: admin
      connection-string: mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo-prod-cluster/streaming-history-prod

logging:
  level:
    root: ERROR
    com.viora: WARN

server:
  port: 8085
  compression:
    enabled: true
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

