spring:
  application:
    name: user-streaming-history
  data:
    mongodb:
      username: ${MONGO_USERNAME:root}
      password: ${MONGO_PASSWORD:secret}
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27018}
      database: ${MONGO_DATABASE:streaming-history}
      authentication-database: ${MONGO_AUTH_DB:admin}
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}

server:
  port: ${SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

